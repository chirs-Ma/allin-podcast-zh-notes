<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>All-In Podcast 中文可视化笔记</title>
  <style>
    :root {
      --bg: oklch(0.965 0.012 86);
      --paper: oklch(0.986 0.006 86);
      --paper-soft: oklch(0.94 0.014 86);
      --ink: oklch(0.24 0.024 255);
      --muted: oklch(0.48 0.026 255);
      --line: oklch(0.84 0.016 86);
      --line-strong: oklch(0.73 0.026 86);
      --accent: oklch(0.54 0.13 35);
      --accent-soft: oklch(0.91 0.045 45);
      --blue: oklch(0.43 0.08 255);
      --teal: oklch(0.47 0.075 188);
      --shadow: 0 18px 46px color-mix(in oklch, var(--ink) 12%, transparent);
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.74;
    }
    a { color: var(--blue); text-decoration-thickness: 1px; text-underline-offset: 3px; }

    .container {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 80px;
    }

    .site-header {
      margin-bottom: 40px;
    }
    .site-header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .site-header p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }
    .site-header .accent-line {
      display: block;
      width: 48px;
      height: 3px;
      background: var(--accent);
      margin: 16px 0 0;
      border-radius: 2px;
    }

    .episode-list {
      display: grid;
      gap: 12px;
    }

    .episode-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .episode-card:hover {
      border-color: var(--line-strong);
      background: var(--paper-soft);
    }
    .episode-card:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 16%, transparent);
    }

    .episode-title {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.45;
      font-weight: 500;
      color: var(--ink);
    }
    .episode-date {
      font-size: 0.875rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .site-footer {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
    }
    .site-footer a { color: var(--muted); }
    .site-footer a:hover { color: var(--blue); }

    @media (max-width: 640px) {
      .container {
        width: calc(100% - 24px);
        padding: 28px 0 60px;
      }
      .episode-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        padding: 14px 16px;
      }
      .episode-title {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1>All-In Podcast 中文可视化笔记</h1>
      <p>将 All-In Podcast 的精彩内容以中文呈现，快速获取科技、商业与投资的前沿洞察。</p>
      <span class="accent-line" aria-hidden="true"></span>
    </header>

    <main class="episode-list" id="episode-list">
      <a
        class="episode-card"
        href="./episodes/2026-04-24-spacex-cursor-deal-saas-debt-bomb-new-apple-ceo-splc-indictment-colon-cancer-spike/notes.visual.html"
      >
        <h2 class="episode-title">SpaceX-Cursor交易、SaaS债务炸弹、苹果换帅、SPLC起诉、结肠癌飙升</h2>
        <span class="episode-date">2026-04-24</span>
      </a>
      <a
        class="episode-card"
        href="./episodes/2026-04-17-openai-s-identity-crisis-datacenter-wars-market-up-on-iran-news-mamdani-s-first-tax-swalw/notes.visual.html"
      >
        <h2 class="episode-title">OpenAI的信仰危机、数据中心战争、市场因伊朗消息而上涨，以及"投机税"与"政治丑闻"</h2>
        <span class="episode-date">2026-04-17</span>
      </a>
    </main>

    <footer class="site-footer">
      <p>基于 <a href="https://www.youtube.com/@allin" target="_blank" rel="noopener">All-In Podcast</a> 内容制作 · 仅供学习交流</p>
    </footer>
  </div>
</body>
</html>
